[theme]
primaryColor = "#6C5CE7"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F4F2FB"
textColor = "#1A1A2E"
font = "sans serif"

[browser]
gatherUsageStats = false

[client]
# Juniors never see tracebacks; full traces still land in the app logs
# (Streamlit Cloud -> Manage app -> Logs) because every friendly-error path
# pairs with logger.exception. See README troubleshooting.
showErrorDetails = "none"

[server]
headless = true
